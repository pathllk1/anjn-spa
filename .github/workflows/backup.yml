name: Hourly DB Backup

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:      # manual trigger

jobs:
  call-backup-api:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Start Job
        run: echo "Starting backup job at $(date)"

      - name: 🔐 Check if secret exists
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "❌ ERROR: CRON_SECRET is NOT set in GitHub Secrets"
            exit 1
          else
            echo "✅ Secret is present"
          fi

      - name: 🌐 Call Backup API (with retries + logs)
        run: |
          URL="https://anjn-spa.vercel.app/api/cron/backup"
          MAX_RETRIES=3
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "🔁 Attempt $i of $MAX_RETRIES"

            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$URL" \
              -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}")

            BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS\:.*//g')
            STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')

            echo "📦 Response Body:"
            echo "$BODY"
            echo "📊 HTTP Status: $STATUS"

            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Backup API call succeeded"
              exit 0
            else
              echo "⚠️ Failed attempt $i"

              if [ "$i" -lt "$MAX_RETRIES" ]; then
                echo "⏳ Retrying in $RETRY_DELAY seconds..."
                sleep $RETRY_DELAY
              fi
            fi
          done

          echo "❌ All attempts failed"
          exit 1

      - name: 🏁 Job Finished
        run: echo "Backup job completed at $(date)"