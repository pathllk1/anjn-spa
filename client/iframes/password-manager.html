<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update User Passwords</title>

  <!-- jQuery UI Blitzer theme (required by jqGrid guiStyle:'blitzer') -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/blitzer/jquery-ui.min.css" />

  <!-- jqGrid CSS (cdnjs, correct package) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqgrid/5.8.10/css/ui.jqgrid.min.css" />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- Export libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- Common Styles -->
  <link rel="stylesheet" href="admin-common.css" />

  <!-- Page-specific overrides: password-manager.html (danger-red theme) -->
  <style>
    :root {
      --grad-from:       #dc3545;
      --grad-to:         #c82333;
      --accent:          #dc3545;
      --accent-focus:    rgba(220, 53, 69, 0.10);
      --accent-btn-glow: rgba(220, 53, 69, 0.30);
    }
    html, body { overflow: hidden; }

    /* Compact layout override (tighter than base .container-full) */
    .container-full { padding: 6px 8px; gap: 4px; }

    /* This page uses a filled grey cancel button inside grid cells */
    .btn-cancel       { background-color: #6c757d; color: white; }
    .btn-cancel:hover { background-color: #5c636a; }

    /* Hide legacy separate sections superseded by .top-bar */
    .header-section, .stats-section, .stat-card,
    .stat-label, .stat-value, .search-section, .search-group { display: none !important; }
  </style>
</head>
<body>
  <div class="container-full">

    <!-- Compact top bar: title | stats | search — all in one line -->
    <div class="top-bar">
      <div class="top-bar-title">
        <i class="fas fa-key"></i>
        Update Passwords
      </div>
      <div class="top-bar-divider"></div>
      <span class="stat-pill blue"><i class="fas fa-users"></i> <span id="stat-total">-</span> Users</span>
      <span class="stat-pill green"><i class="fas fa-check"></i> <span id="stat-changes">-</span> Changes</span>
      <span class="stat-pill orange"><i class="fas fa-exclamation-triangle"></i> <span id="stat-failures">-</span> Failed</span>
      <div class="top-bar-divider"></div>
      <div class="top-bar-search">
        <input id="search-input" type="text" placeholder="🔍 Search name, email, firm…" />
      </div>
    </div>

    <!-- Security notice — one compact line -->
    <div class="security-notice">
      <strong>🔒 SECURITY:</strong>
      <span>Bcrypt 12 rounds</span>
      <span>·</span><span>Full audit log</span>
      <span>·</span><span>Sessions invalidated on change</span>
      <span>·</span><span>Lockout cleared</span>
    </div>

    <!-- Grid Section — takes all remaining space -->
    <div class="grid-section">
      <div id="grid-container">
        <table id="password-grid"></table>
        <div id="grid-pager"></div>
        <div class="loading-overlay">
          <div class="spinner"></div>
          <span style="font-size:12px;">Loading…</span>
        </div>
      </div>
    </div>

  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- jQuery UI (required by jqGrid 5.8.10) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>

  <!-- jqGrid locale (must load before main JS) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqgrid/5.8.10/js/i18n/grid.locale-en.min.js"></script>

  <!-- jqGrid JS (cdnjs, correct package — exposes $.fn.jqGrid) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqgrid/5.8.10/js/jquery.jqGrid.min.js"></script>

  <!-- Application Logic -->
  <script>
    // ═══════════════════════════════════════════════════════════════════════════
    // STATE & CONFIGURATION
    // ═══════════════════════════════════════════════════════════════════════════

    const state = {
      users: [],
      auditStats: { totalUsers: 0, successfulChanges: 0, failedAttempts: 0 },
      filteredUsers: [],
      searchTerm: '',
      editingUserId: null,
      newPasswords: new Map(),
      instance: null,
      PASSWORD_MIN_LENGTH: 8,
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // UTILITY: Toast Notifications
    // ═══════════════════════════════════════════════════════════════════════════

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast-notification toast-${type}`;
      toast.innerHTML = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease-out reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // UTILITY: Password Strength Calculation
    // ═══════════════════════════════════════════════════════════════════════════

    function getPasswordStrength(password) {
      if (!password) return { level: 0, text: 'Very Weak', color: '#dc3545' };

      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.length >= 12) strength++;
      if (password.length >= 16) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[!@#$%^&*()_\-+=\[\]{};:'",.<>?/\\|`~]/.test(password)) strength++;

      const levels = [
        { level: 0, text: 'Very Weak', color: '#dc3545', width: 15 },
        { level: 1, text: 'Weak', color: '#fd7e14', width: 30 },
        { level: 2, text: 'Fair', color: '#ffc107', width: 45 },
        { level: 3, text: 'Good', color: '#0d6efd', width: 65 },
        { level: 4, text: 'Strong', color: '#28a745', width: 80 },
        { level: 5, text: 'Very Strong', color: '#20c997', width: 100 },
      ];

      return levels[Math.min(strength, 5)];
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // UTILITY: Validate Password
    // ═══════════════════════════════════════════════════════════════════════════

    function validatePassword(password) {
      const errors = [];

      if (!password) {
        errors.push('Password is required');
      }
      if (password && password.length < state.PASSWORD_MIN_LENGTH) {
        errors.push(`Password must be at least ${state.PASSWORD_MIN_LENGTH} characters`);
      }
      if (password && !/[A-Z]/.test(password)) {
        errors.push('Password must contain at least one uppercase letter');
      }
      if (password && !/[a-z]/.test(password)) {
        errors.push('Password must contain at least one lowercase letter');
      }
      if (password && !/[0-9]/.test(password)) {
        errors.push('Password must contain at least one number');
      }
      if (password && !/[!@#$%^&*()_\-+=\[\]{};:'",.<>?/\\|`~]/.test(password)) {
        errors.push('Password must contain at least one special character');
      }

      return errors;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // UTILITY: Update Stats Display
    // ═══════════════════════════════════════════════════════════════════════════

    function updateStats() {
      document.getElementById('stat-total').textContent = state.auditStats.totalUsers;
      document.getElementById('stat-changes').textContent = state.auditStats.successfulChanges;
      document.getElementById('stat-failures').textContent = state.auditStats.failedAttempts;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // FILTERING LOGIC
    // ═══════════════════════════════════════════════════════════════════════════

    function applyFilters() {
      let filtered = [...state.users];

      if (state.searchTerm) {
        const term = state.searchTerm.toLowerCase();
        filtered = filtered.filter(u =>
          u.fullname?.toLowerCase().includes(term) ||
          u.username?.toLowerCase().includes(term) ||
          u.email?.toLowerCase().includes(term) ||
          u.firm_name?.toLowerCase().includes(term)
        );
      }

      state.filteredUsers = filtered;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // ROLE COLOR MAPPING
    // ═══════════════════════════════════════════════════════════════════════════

    function getRoleClass(role) {
      const map = {
        super_admin: 'role-super-admin',
        admin: 'role-admin',
        manager: 'role-manager',
        user: 'role-user',
      };
      return map[role] || 'role-user';
    }

    function formatRole(role) {
      return role.replace('_', ' ').toUpperCase();
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // GRID INITIALIZATION & RENDERING
    // ═══════════════════════════════════════════════════════════════════════════

    var _gridInitRetries = 0;
    var _GRID_MAX_RETRIES = 50; /* 50 × 100ms = 5 seconds max */

    function buildGridData() {
      return state.filteredUsers.map(function (user) {
        var uid = String(user._id || user.id || '');
        return {
          id:       uid,
          userId:   uid,
          fullname: user.fullname,
          username: user.username,
          email:    user.email,
          role:     user.role,
          firm:     user.firm_name || '—',
        };
      });
    }

    function initializeGrid() {
      if (typeof $ === 'undefined' || typeof $.fn.jqGrid === 'undefined') {
        _gridInitRetries++;
        if (_gridInitRetries > _GRID_MAX_RETRIES) {
          console.error('jqGrid failed to load after ' + _GRID_MAX_RETRIES + ' retries.');
          return;
        }
        setTimeout(initializeGrid, 100);
        return;
      }
      _gridInitRetries = 0;

      /* GridUnload strips jqGrid bindings off the existing <table> and pager
         elements and leaves them in the DOM — correct pattern for reinit. */
      try {
        var gridEl = document.getElementById('password-grid');
        if (gridEl) {
          $('#password-grid').jqGrid('GridUnload');
        }
      } catch (e) { /* first load — nothing to unload */ }

      var gridData = buildGridData();
      try {
        $('#password-grid').jqGrid({
          data:     gridData,
          datatype: 'local',
          colNames: ['#', 'UserId', 'Full Name', 'Username', 'Email', 'Role', 'Firm', 'Password', 'Actions'],
          colModel: [
            /* ── Hidden key/internal columns ──────────────────────── */
            { name: 'id',       index: 'id',       width: 30,  hidden: true, key: true,
              viewable: false, search: false },
            { name: 'userId',   index: 'userId',   width: 1,   hidden: true,
              viewable: false, search: false },

            /* ── Full Name — shown in grid + view modal ────────────── */
            {
              name:     'fullname',
              index:    'fullname',
              width:    170,
              viewable: true,
              stype:    'text',
              searchoptions: { sopt: ['cn', 'bw', 'eq'] },
              formatter: function (cellValue, opts, rowData) {
                var roleClass = getRoleClass(rowData.role);
                var roleLabel = formatRole(rowData.role);
                return '<span style="font-weight:600;color:#1e293b;margin-right:4px;">'
                  + cellValue
                  + '</span><span class="role-badge ' + roleClass + '">' + roleLabel + '</span>';
              },
            },

            /* ── Username — hidden in grid, shown in view modal ─────── */
            { name: 'username', index: 'username', width: 100, hidden: true,
              viewable: true, stype: 'text',
              searchoptions: { sopt: ['cn', 'bw', 'eq'] } },

            /* ── Email ──────────────────────────────────────────────── */
            {
              name:     'email',
              index:    'email',
              width:    180,
              viewable: true,
              stype:    'text',
              searchoptions: { sopt: ['cn', 'bw', 'eq'] },
              formatter: function (cellValue) {
                return '<a href="mailto:' + cellValue + '" style="color:#0d6efd;text-decoration:none;">'
                  + cellValue + '</a>';
              },
            },

            /* ── Role — hidden in grid, shown in view modal ──────────── */
            { name: 'role', index: 'role', width: 80, hidden: true,
              viewable: true,
              stype:    'select',
              searchoptions: {
                value: ':All;super_admin:Super Admin;admin:Admin;manager:Manager;user:User',
                sopt:  ['eq'],
              },
            },

            /* ── Firm ────────────────────────────────────────────────── */
            {
              name:     'firm',
              index:    'firm',
              width:    140,
              viewable: true,
              stype:    'text',
              searchoptions: { sopt: ['cn', 'bw', 'eq'] },
              formatter: function (cellValue) {
                return '<span style="font-weight:500;color:#1e293b;">' + cellValue + '</span>';
              },
            },

            /* ── Password input — grid-only, hidden from view / search ─ */
            {
              name:      'password',
              index:     'password',
              width:     210,
              sortable:  false,
              viewable:  false,
              search:    false,
              formatter: function (cellValue, opts, rowData) {
                var uid       = rowData.userId || rowData.id || '';
                var isEditing = (String(state.editingUserId) === String(uid));
                var password  = state.newPasswords.get(uid) || '';
                if (isEditing) {
                  var s = getPasswordStrength(password);
                  var strengthHtml = password
                    ? '<span style="display:inline-block;width:40px;height:4px;background:#e9ecef;'
                      + 'border-radius:2px;vertical-align:middle;margin-left:4px;">'
                      + '<span style="display:block;width:' + s.width + '%;height:100%;background:'
                      + s.color + ';border-radius:2px;"></span></span>'
                      + '<span style="color:' + s.color + ';font-size:9px;margin-left:2px;">' + s.text + '</span>'
                    : '';
                  return '<input type="password" class="password-input" data-user-id="' + uid + '" '
                    + 'placeholder="New password" value="' + password + '" />' + strengthHtml;
                }
                return '<span style="color:#94a3b8;font-size:11px;font-style:italic;">'
                  + '<i class="fas fa-lock" style="margin-right:4px;"></i>Click Edit to set password</span>';
              },
            },
            {
              name:      'actions',
              index:     'actions',
              width:     110,
              sortable:  false,
              viewable:  false,
              search:    false,
              formatter: function (cellValue, opts, rowData) {
                var uid       = rowData.userId || rowData.id || '';
                var isEditing = (String(state.editingUserId) === String(uid));
                if (isEditing) {
                  return `<div class="action-buttons">
                    <button type="button" class="btn-small btn-cancel"
                      data-action="cancel" data-user-id="${uid}">Cancel</button>
                    <button type="button" class="btn-small btn-update"
                      data-action="update" data-user-id="${uid}">Update</button>
                  </div>`;
                }
                return `<div class="action-buttons">
                  <button type="button" class="btn-small btn-edit"
                    data-action="edit" data-user-id="${uid}">Edit</button>
                </div>`;
              },
            },
          ],
          width:       $('#grid-container').width() - 2,
          shrinkToFit: true,
          rowHeight:   20,
          height:      Math.max(300, window.innerHeight - 480),
          pager:       '#grid-pager',
          rowNum:      10,
          rowList:     [10, 20, 50, 100],
          viewrecords: true,
          sortname:    'fullname',
          sortorder:   'asc',
          caption:     'User Password Management',
          guiStyle:    'blitzer',
          iconSet:     'fontAwesome',
          onCellSelect: function () {},
        });

        /* ── navGrid: enable built-in Search, View, Refresh ───────── */
        $('#password-grid').jqGrid('navGrid', '#grid-pager', {
          edit:    false,
          add:     false,
          del:     false,
          search:  true,      /* ← built-in multi-field search modal     */
          refresh: true,      /* ← built-in reload button                */
          view:    true,      /* ← built-in read-only form view modal    */
          refreshstate: 'current',
        },
        {},   /* edit   options (unused) */
        {},   /* add    options (unused) */
        {},   /* del    options (unused) */
        {     /* search options */
          multipleSearch:   true,
          multipleGroup:    false,
          showQuery:        false,
          closeOnEscape:    true,
          closeAfterSearch: true,
          overlay:          false,
          caption:          'Search Users',
          Find:             'Find',
          Reset:            'Reset',
          sopt:             ['cn', 'bw', 'eq', 'ew', 'nc'],
        },
        {     /* view options */
          closeOnEscape: true,
          recreateForm:  true,
          caption:       'User Details',
          bClose:        'Close',
          width:         400,
        })

        /* ── Separator before export group ─────────────────────────── */
        .jqGrid('navSeparatorAdd', '#grid-pager', {
          sepclass:   'ui-separator',
          sepcontent: '',
        })

        /* ── Export: CSV ────────────────────────────────────────────── */
        .jqGrid('navButtonAdd', '#grid-pager', {
          caption:       '',
          title:         'Export CSV',
          buttonicon:    'ui-icon-document',
          id:            'pw-export-csv',
          position:      'last',
          onClickButton: function () { exportCSV(); },
        })

        /* ── Export: Excel ──────────────────────────────────────────── */
        .jqGrid('navButtonAdd', '#grid-pager', {
          caption:       '',
          title:         'Export Excel',
          buttonicon:    'ui-icon-script',
          id:            'pw-export-xlsx',
          position:      'last',
          onClickButton: function () { exportExcel(); },
        })

        /* ── Export: PDF ────────────────────────────────────────────── */
        .jqGrid('navButtonAdd', '#grid-pager', {
          caption:       '',
          title:         'Export PDF',
          buttonicon:    'ui-icon-print',
          id:            'pw-export-pdf',
          position:      'last',
          onClickButton: function () { exportPDF(); },
        });

        $(window).off('resize.pwgrid').on('resize.pwgrid', function () {
          $('#password-grid').jqGrid('setGridWidth', $('#grid-container').width() - 2, true);
        });

        state.instance = $('#password-grid');
        hideLoadingOverlay();

      } catch (err) {
        console.error('Error initializing grid:', err);
        showToast('Error loading grid: ' + err.message, 'error');
        hideLoadingOverlay();
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // EXPORT UTILITIES
    // ═══════════════════════════════════════════════════════════════════════════

    /* Shared: build clean row objects from filteredUsers */
    function buildExportRows() {
      return state.filteredUsers.map(function (u) {
        return {
          'Full Name': u.fullname  || '',
          'Username':  u.username  || '',
          'Email':     u.email     || '',
          'Role':      formatRole(u.role || 'user'),
          'Firm':      u.firm_name || '—',
        };
      });
    }

    /* ── Export CSV ──────────────────────────────────────────────── */
    function exportCSV() {
      var rows = buildExportRows();
      if (!rows.length) { showToast('No data to export', 'info'); return; }
      var headers = Object.keys(rows[0]);
      var csv = headers.map(function (h) { return '"' + h + '"'; }).join(',') + '\n';
      rows.forEach(function (r) {
        csv += headers.map(function (h) {
          return '"' + String(r[h]).replace(/"/g, '""') + '"';
        }).join(',') + '\n';
      });
      var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href   = url;
      a.download = 'users-export.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('CSV downloaded', 'success');
    }

    /* ── Export Excel (SheetJS) ──────────────────────────────────── */
    function exportExcel() {
      if (typeof XLSX === 'undefined') { showToast('SheetJS not loaded', 'error'); return; }
      var rows = buildExportRows();
      if (!rows.length) { showToast('No data to export', 'info'); return; }

      var ws = XLSX.utils.json_to_sheet(rows);

      /* Column widths */
      ws['!cols'] = [
        { wch: 24 }, { wch: 16 }, { wch: 30 }, { wch: 14 }, { wch: 22 },
      ];

      /* Header row style (SheetJS CE can't style, but set cell metadata) */
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Users');
      XLSX.writeFile(wb, 'users-export.xlsx');
      showToast('Excel downloaded', 'success');
    }

    /* ── Export PDF (jsPDF + autoTable) ─────────────────────────── */
    function exportPDF() {
      var jspdf = window.jspdf;
      if (!jspdf || !jspdf.jsPDF) { showToast('jsPDF not loaded', 'error'); return; }
      var rows = buildExportRows();
      if (!rows.length) { showToast('No data to export', 'info'); return; }

      var doc  = new jspdf.jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' });
      var headers = Object.keys(rows[0]);
      var body    = rows.map(function (r) { return headers.map(function (h) { return r[h]; }); });

      /* Title */
      doc.setFontSize(13);
      doc.setTextColor(30, 41, 59);
      doc.text('User Password Management — Export', 40, 36);
      doc.setFontSize(9);
      doc.setTextColor(107, 114, 128);
      doc.text('Generated: ' + new Date().toLocaleString('en-IN'), 40, 52);

      doc.autoTable({
        head:        [headers],
        body:        body,
        startY:      62,
        theme:       'grid',
        headStyles:  { fillColor: [30, 41, 59], textColor: 255, fontStyle: 'bold', fontSize: 9 },
        bodyStyles:  { fontSize: 8, textColor: [31, 41, 55] },
        alternateRowStyles: { fillColor: [249, 250, 251] },
        columnStyles: {
          0: { cellWidth: 130 },
          1: { cellWidth: 90  },
          2: { cellWidth: 180 },
          3: { cellWidth: 80  },
          4: { cellWidth: 130 },
        },
        margin: { left: 40, right: 40 },
      });

      doc.save('users-export.pdf');
      showToast('PDF downloaded', 'success');
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // EVENT HANDLERS
    // ═══════════════════════════════════════════════════════════════════════════

    /* ── rebuildGrid ────────────────────────────────────────────────────────
       Internal helper: destroys + reinitialises the jqGrid.
       Used by edit/cancel/update/search actions.
       Does NOT re-attach event listeners — those are attached exactly once.
    ─────────────────────────────────────────────────────────────────────── */
    function rebuildGrid() {
      if (state.instance && state.instance[0] && state.instance[0].grid) {
        var gridData = buildGridData();
        state.instance.jqGrid('clearGridData');
        state.instance.jqGrid('setGridParam', { data: gridData });
        state.instance.trigger('reloadGrid', [{ current: true }]);
        return;
      }
      initializeGrid();
    }

    /* ── attachEventHandlers ────────────────────────────────────────────────
       Called ONCE after the first successful grid init.
       Uses capture-phase delegation so jqGrid click handling can't block it.
    ─────────────────────────────────────────────────────────────────────── */
    window.pwEdit = function(userId) {
      state.editingUserId = String(userId);
      rebuildGrid();
    };

    window.pwCancel = function(userId) {
      state.editingUserId = null;
      state.newPasswords.delete(userId);
      rebuildGrid();
    };

    window.pwUpdate = function(userId) {
      /* Read password value directly from input in the cell */
      var input = document.querySelector('.password-input[data-user-id="' + userId + '"]');
      var password = input ? input.value : (state.newPasswords.get(userId) || '');
      state.newPasswords.set(userId, password);

      var validationErrors = validatePassword(password);
      if (validationErrors.length > 0) {
        showToast('Validation failed:<br>' + validationErrors.join('<br>'), 'error');
        return;
      }
      var user = state.users.find(function(u) { return String(u._id) === userId; });
      if (!user) { showToast('User not found', 'error'); return; }
      showConfirmationModal(user, password, userId);
    };

    var _handlersAttached = false;

    function attachEventHandlers() {
      if (_handlersAttached) return;
      _handlersAttached = true;

      /* Action buttons — capture phase to bypass jqGrid click handling. */
      document.getElementById('grid-container').addEventListener('click', function(e) {
        var btn = e.target.closest('button[data-action]');
        if (!btn) return;
        e.preventDefault();
        e.stopPropagation();
        var action = btn.getAttribute('data-action');
        var userId = btn.getAttribute('data-user-id');
        if (!userId) return;
        if (action === 'edit') window.pwEdit(userId);
        if (action === 'cancel') window.pwCancel(userId);
        if (action === 'update') window.pwUpdate(userId);
      }, true);

      /* Search — top bar drives state.searchTerm → applyFilters → rebuildGrid */
      document.getElementById('search-input').addEventListener('input', function(e) {
        state.searchTerm = e.target.value;
        applyFilters();
        rebuildGrid();
        /* If the user clears the bar, also clear any active jqGrid search filters */
        if (!e.target.value && state.instance) {
          state.instance.jqGrid('setGridParam', { search: false, postData: { filters: '' } });
        }
      });

      /* Password input strength update — oninput on the rendered input.
         We delegate on the grid container so it survives cell rebuilds. */
      document.getElementById('grid-container').addEventListener('input', function(e) {
        if (e.target.classList.contains('password-input')) {
          var userId = e.target.getAttribute('data-user-id');
          state.newPasswords.set(userId, e.target.value);
          /* Don't rebuild on every keystroke — just update internal state.
             The strength bar is redrawn on next full rebuild (e.g. Update click). */
        }
      });
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // CONFIRMATION MODAL
    // ═══════════════════════════════════════════════════════════════════════════

    function showConfirmationModal(user, password, userId) {
      const modalId = 'password-confirm-' + Date.now();
      const modal = document.createElement('div');
      modal.id = modalId;
      modal.style.cssText = `
        position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); 
        display: flex; align-items: center; justify-content: center; z-index: 3000;
      `;

      modal.innerHTML = `
        <div style="background: white; border-radius: 12px; box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
                    max-width: 400px; width: 90%; border: 2px solid #dc3545;">
          <!-- Header -->
          <div style="background: linear-gradient(to right, #dc3545, #c82333); color: white; 
                      padding: 1.25rem; border-radius: 10px 10px 0 0;">
            <h3 style="margin: 0; font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 8px;">
              <i class="fas fa-exclamation-triangle"></i> Confirm Password Change
            </h3>
          </div>

          <!-- Body -->
          <div style="padding: 1.5rem; space-y: 1rem;">
            <!-- User Info -->
            <div style="background: #f8f9fa; border-radius: 8px; padding: 1rem; margin-bottom: 1rem;">
              <p style="margin: 0 0 0.5rem 0; font-size: 14px; color: #6c757d;">
                <strong>User:</strong> ${user.fullname} (${user.username})
              </p>
              <p style="margin: 0 0 0.5rem 0; font-size: 14px; color: #6c757d;">
                <strong>Email:</strong> ${user.email}
              </p>
              <p style="margin: 0; font-size: 14px; color: #6c757d;">
                <strong>Firm:</strong> ${user.firm_name}
              </p>
            </div>

            <!-- Warnings -->
            <div style="background: #fff5f5; border-left: 4px solid #dc3545; padding: 0.875rem; margin-bottom: 1rem;">
              <p style="margin: 0 0 0.5rem 0; font-size: 12px; font-weight: 600; color: #721c24;">
                ⚠️ SEVERE CAUTION:
              </p>
              <ul style="margin: 0; padding-left: 1.25rem; font-size: 12px; color: #721c24;">
                <li>This action <strong>CANNOT BE UNDONE</strong></li>
                <li>Current password will be <strong>PERMANENTLY DELETED</strong></li>
                <li>All other sessions will be <strong>INVALIDATED</strong></li>
                <li>This action will be <strong>PERMANENTLY LOGGED</strong></li>
              </ul>
            </div>

            <!-- Confirmation Checkbox -->
            <label style="display: flex; align-items: flex-start; gap: 0.75rem; cursor: pointer; 
                          background: #fff5f5; border: 2px solid #dc3545; border-radius: 6px; padding: 0.75rem;">
              <input type="checkbox" id="confirm-check-${modalId}" style="margin-top: 2px; cursor: pointer;" />
              <span style="font-size: 12px; color: #721c24; text-align: left;">
                I understand that this action is <strong>IRREVERSIBLE</strong> and will 
                <strong>PERMANENTLY CHANGE</strong> the user's password. I confirm I am updating 
                the correct user and accept all consequences.
              </span>
            </label>
          </div>

          <!-- Footer -->
          <div style="display: flex; gap: 0.75rem; padding: 1rem; background: #f8f9fa; 
                      border-top: 1px solid #dee2e6; border-radius: 0 0 10px 10px;">
            <button id="cancel-${modalId}" style="flex: 1; padding: 0.625rem; border: 1px solid #dee2e6; 
                          background: white; color: #495057; font-weight: 500; border-radius: 6px; cursor: pointer;">
              Cancel
            </button>
            <button id="confirm-${modalId}" style="flex: 1; padding: 0.625rem; background: #dc3545; 
                          color: white; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; opacity: 0.5;"
                    disabled>
              Update Password
            </button>
          </div>
        </div>
      `;

      document.body.appendChild(modal);

      const checkbox = document.getElementById(`confirm-check-${modalId}`);
      const confirmBtn = document.getElementById(`confirm-${modalId}`);
      const cancelBtn = document.getElementById(`cancel-${modalId}`);

      checkbox.addEventListener('change', () => {
        if (checkbox.checked) {
          confirmBtn.style.opacity = '1';
          confirmBtn.disabled = false;
        } else {
          confirmBtn.style.opacity = '0.5';
          confirmBtn.disabled = true;
        }
      });

      confirmBtn.addEventListener('click', () => {
        modal.remove();
        // Send password update request to parent
        window.parent.postMessage(
          {
            type: 'UPDATE_USER_PASSWORD',
            userId,
            newPassword: password,
          },
          '*'
        );
      });

      cancelBtn.addEventListener('click', () => {
        modal.remove();
      });

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.remove();
        }
      });
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // LOADING STATE
    // ═══════════════════════════════════════════════════════════════════════════

    function hideLoadingOverlay() {
      const overlay = document.querySelector('.loading-overlay');
      if (overlay) {
        overlay.classList.add('hidden');
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // MESSAGE HANDLERS: Receive data and commands from parent
    // ═══════════════════════════════════════════════════════════════════════════

    window.addEventListener('message', (event) => {
      const msg = event.data;

      if (!msg || !msg.type) return;

      // ── RECEIVE_DATA: Parent sends users and audit stats
      if (msg.type === 'RECEIVE_DATA') {
        state.users = msg.users || [];
        state.auditStats = msg.auditStats || {
          totalUsers: 0,
          successfulChanges: 0,
          failedAttempts: 0,
        };
        applyFilters();
        updateStats();
        /* Always rebuild — GridUnload inside initializeGrid handles cleanup */
        setTimeout(function() {
          initializeGrid();
          /* Attach handlers exactly once after first successful data load */
          attachEventHandlers();
        }, 100);
      }

      // ── UPDATE_SUCCESS: Parent confirms successful password update
      if (msg.type === 'UPDATE_SUCCESS') {
        showToast(msg.message || 'Password updated successfully', 'success');
        state.editingUserId = null;
        state.newPasswords.clear();
        // Parent will send updated data
      }

      // ── UPDATE_ERROR: Parent reports password update failure
      if (msg.type === 'UPDATE_ERROR') {
        showToast(msg.error || 'Failed to update password', 'error');
      }

      // ── REFRESH_DATA: Parent sends refreshed data after update
      if (msg.type === 'REFRESH_DATA') {
        state.users = msg.users || [];
        state.auditStats = msg.auditStats || {
          totalUsers: 0,
          successfulChanges: 0,
          failedAttempts: 0,
        };
        applyFilters();
        updateStats();
        setTimeout(function() { initializeGrid(); }, 100);
      }
    });

    // ═══════════════════════════════════════════════════════════════════════════
    // STARTUP: Notify parent that iframe is ready
    // ═══════════════════════════════════════════════════════════════════════════

    window.parent.postMessage('IFRAME_READY_PASSWORD', '*');
  </script>
</body>
</html>
